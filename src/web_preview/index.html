<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fei web preview</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #111; }
    body { display: grid; place-items: center; overflow: hidden; }
    img { max-width: 100vw; max-height: 100vh; object-fit: contain; image-rendering: auto; }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      min-width: 260px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.64);
      color: #e8e8e8;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      pointer-events: none;
      white-space: pre;
    }
    #hud .error { color: #ffb4a8; }
  </style>
</head>
<body>
  <img id="frame" alt="fei web preview">
  <div id="hud">waiting for status...</div>
  <script>
    const frame = document.getElementById("frame");
    const hud = document.getElementById("hud");
    const delayMs = 100;
    const keyCodes = {
      Space: 32,
      Quote: 39,
      Comma: 44,
      Minus: 45,
      Period: 46,
      Slash: 47,
      Digit0: 48,
      Digit1: 49,
      Digit2: 50,
      Digit3: 51,
      Digit4: 52,
      Digit5: 53,
      Digit6: 54,
      Digit7: 55,
      Digit8: 56,
      Digit9: 57,
      Semicolon: 59,
      Equal: 61,
      KeyA: 65,
      KeyB: 66,
      KeyC: 67,
      KeyD: 68,
      KeyE: 69,
      KeyF: 70,
      KeyG: 71,
      KeyH: 72,
      KeyI: 73,
      KeyJ: 74,
      KeyK: 75,
      KeyL: 76,
      KeyM: 77,
      KeyN: 78,
      KeyO: 79,
      KeyP: 80,
      KeyQ: 81,
      KeyR: 82,
      KeyS: 83,
      KeyT: 84,
      KeyU: 85,
      KeyV: 86,
      KeyW: 87,
      KeyX: 88,
      KeyY: 89,
      KeyZ: 90,
      BracketLeft: 91,
      Backslash: 92,
      BracketRight: 93,
      Backquote: 96,
      Escape: 256,
      Enter: 257,
      Tab: 258,
      Backspace: 259,
      Insert: 260,
      Delete: 261,
      ArrowRight: 262,
      ArrowLeft: 263,
      ArrowDown: 264,
      ArrowUp: 265,
      PageUp: 266,
      PageDown: 267,
      Home: 268,
      End: 269,
      CapsLock: 280,
      ScrollLock: 281,
      NumLock: 282,
      PrintScreen: 283,
      Pause: 284,
      F1: 290,
      F2: 291,
      F3: 292,
      F4: 293,
      F5: 294,
      F6: 295,
      F7: 296,
      F8: 297,
      F9: 298,
      F10: 299,
      F11: 300,
      F12: 301,
      F13: 302,
      F14: 303,
      F15: 304,
      F16: 305,
      F17: 306,
      F18: 307,
      F19: 308,
      F20: 309,
      F21: 310,
      F22: 311,
      F23: 312,
      F24: 313,
      Numpad0: 320,
      Numpad1: 321,
      Numpad2: 322,
      Numpad3: 323,
      Numpad4: 324,
      Numpad5: 325,
      Numpad6: 326,
      Numpad7: 327,
      Numpad8: 328,
      Numpad9: 329,
      NumpadDecimal: 330,
      NumpadDivide: 331,
      NumpadMultiply: 332,
      NumpadSubtract: 333,
      NumpadAdd: 334,
      NumpadEnter: 335,
      NumpadEqual: 336,
      ShiftLeft: 340,
      ControlLeft: 341,
      AltLeft: 342,
      MetaLeft: 343,
      ShiftRight: 344,
      ControlRight: 345,
      AltRight: 346,
      MetaRight: 347,
      ContextMenu: 348,
    };
    const pressedKeys = new Set();
    function refresh() {
      frame.src = "/frame.jpg?t=" + Date.now();
    }
    function postKey(key, down) {
      fetch(`/input/key?key=${key}&down=${down ? 1 : 0}`, {
        method: "POST",
        cache: "no-store",
        keepalive: true,
      }).catch(() => {});
    }
    function handleKey(event, down) {
      const key = keyCodes[event.code];
      if (key === undefined) {
        return;
      }
      event.preventDefault();
      if (down) {
        if (pressedKeys.has(key)) {
          return;
        }
        pressedKeys.add(key);
      } else if (!pressedKeys.delete(key)) {
        return;
      }
      postKey(key, down);
    }
    function releaseAllKeys() {
      for (const key of pressedKeys) {
        postKey(key, false);
      }
      pressedKeys.clear();
      fetch("/input/clear", {
        method: "POST",
        cache: "no-store",
        keepalive: true,
      }).catch(() => {});
    }
    frame.onload = () => setTimeout(refresh, delayMs);
    frame.onerror = () => setTimeout(refresh, delayMs);
    window.addEventListener("keydown", event => handleKey(event, true), { capture: true });
    window.addEventListener("keyup", event => handleKey(event, false), { capture: true });
    window.addEventListener("blur", releaseAllKeys);
    window.addEventListener("pagehide", releaseAllKeys);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        releaseAllKeys();
      }
    });
    async function refreshStatus() {
      try {
        const status = await fetch("/status.json?t=" + Date.now(), { cache: "no-store" }).then(r => r.json());
        const lines = [
          "fei web preview",
          "frame: " + (status.has_frame ? status.frame_index : "none"),
          "engine fps: " + status.engine_fps.toFixed(1),
          "capture fps: " + status.capture_fps.toFixed(1),
          "target: " + (status.target || "none"),
          "size: " + (status.has_frame ? `${status.width}x${
    status.height}` : "none"),
          "jpeg: " + status.jpeg_bytes + " bytes",
          "age: " + status.frame_age_ms + " ms",
        ];
if (status.last_error) {
    lines.push("error: " + status.last_error);
    hud.innerHTML = lines.slice(0, -1).join("\n") + "\n<span class=\"error\">" +
                    lines.at(-1) + "</span>";
} else {
    hud.textContent = lines.join("\n");
}
}
catch (error) {
    hud.innerHTML =
        "fei web preview\n<span class=\"error\">status unavailable</span>";
}
}
refresh();
refreshStatus();
setInterval(refreshStatus, 500);
  </script>
</body>
</html>
