<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fei devtools</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #111; color: #eee; font: 12px/1.45 ui-monospace, Consolas, monospace; }
    body { display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }
    img { width: 100%; height: 100vh; object-fit: contain; background: #050505; }
    aside { border-left: 1px solid #333; padding: 12px; overflow: auto; white-space: pre-wrap; }
    .error { color: #ffb4a8; }
  </style>
</head>
<body>
  <img id="frame" alt="rendering frame">
  <aside id="status">waiting...</aside>
  <script>
    const frame = document.getElementById("frame");
    const statusEl = document.getElementById("status");
    frame.src = "/api/v1/blobs/rendering.frame/stream?t=" + Date.now();
    async function refresh() {
      try {
        const [manifest, status] = await Promise.all([
          fetch("/api/v1/manifest?t=" + Date.now(), {cache: "no-store"}).then(r => r.json()),
          fetch("/api/v1/status?t=" + Date.now(), {cache: "no-store"}).then(r => r.json())
        ]);
        statusEl.textContent = JSON.stringify({manifest, status}, null, 2);
      } catch (error) {
        statusEl.innerHTML = '<span class="error">status unavailable</span>';
      }
    }
    refresh();
    setInterval(refresh, 500);
  </script>
</body>
</html>
