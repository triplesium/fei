name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CLANG_FORMAT_VERSION: '20.1.8'

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: format / Windows
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up clang-format
        uses: aminya/setup-cpp@1f17f92d6a52bfcb1a25348e2c526c2e5cbb1134 # v1.8.0
        with:
          clang-format: ${{ env.CLANG_FORMAT_VERSION }}

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          xmake-version: '3.0.9'

      - name: Show clang-format version
        run: clang-format --version

      - name: Check formatting
        run: xmake format --check

  xmake:
    name: tests / Windows / debug
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      LLVM_ROOT: 'C:\Program Files\LLVM'
      VULKAN_SDK_VERSION: '1.4.350.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          xmake-version: '3.0.9'
          package-cache: true
          package-cache-key: windows-vs2026-vulkan-${{ env.VULKAN_SDK_VERSION }}-${{ hashFiles('**/xmake.lua', '.github/workflows/smoke.yml') }}
          project-path: '.'

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da # v1.5.5
        with:
          vulkan_version: ${{ env.VULKAN_SDK_VERSION }}
          cache: true
          stripdown: false
          install_runtime: false

      - name: Show xmake version
        run: xmake --version

      - name: Parse project
        run: xmake show -l targets

      - name: Configure debug build
        run: xmake f -m debug -y

      - name: Build reflection generator
        run: xmake build -y -vD fei-reflgen

      - name: Run all tests
        run: xmake test -y
